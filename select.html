<!DOCTYPE html>
<html lang="ja" class="select-html">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>車種選択 | Car Discovery</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="select-body">
  <main class="select-page">
    <header class="select-header">
      <div>
        <div class="badge">STORE SETTINGS</div>
        <h1>表示する車種を選択</h1>
        <p>
          この店舗・イベントで出したい車種だけにチェックを入れてください。
          体験の流れやマーカーの基本ルールは変えず、スキャン対象だけを切り替えます。
        </p>
      </div>
      <a class="back-link" href="./index.html">ARへ戻る</a>
    </header>

    <section class="select-panel">
      <p class="select-help">
        チェックした車種だけを表示する「お客様用URL」を作成できます。
        お店の人は車種を選び、URLをコピーして、お客様に共有してください。
      </p>

      <div class="quick-url-menu">
        <div>
          <div class="quick-url-label">お客様用URL</div>
          <div id="quick-url-summary" class="quick-url-summary">車種を選択してください</div>
        </div>
        <button id="quick-copy-url-button" type="button">URLをコピー</button>
      </div>

      <div class="select-toolbar">
        <button id="select-all-button" type="button">すべて選択</button>
        <button id="clear-button" type="button" class="secondary-button">すべて外す</button>
      </div>

      <div id="car-select-list" class="car-select-list"></div>

      <div id="select-status" class="select-status"></div>

      <div class="customer-url-box">
        <h2>お客様用URL</h2>
        <p>選択中の車種だけが表示されるURLです。保存しなくても、チェックを変えるだけでURLが更新されます。</p>
        <div id="selected-car-summary" class="selected-car-summary"></div>
        <textarea id="customer-url" readonly rows="3"></textarea>
        <div class="customer-url-actions">
          <button id="copy-url-button" type="button">URLをコピー</button>
          <a id="open-customer-url" class="url-preview-link" href="./index.html" target="_blank" rel="noopener">このURLで確認</a>
        </div>
      </div>

      <div class="select-actions">
        <button id="save-button" type="button">この端末にも保存</button>
        <button id="reset-selection-button" type="button" class="secondary-button">全車種表示に戻す</button>
      </div>
    </section>
  </main>

  <script>
    const ENABLED_CARS_STORAGE_KEY = "carDiscoveryEnabledCarIds_v1";

    const listEl = document.getElementById("car-select-list");
    const statusEl = document.getElementById("select-status");
    const saveButton = document.getElementById("save-button");
    const selectAllButton = document.getElementById("select-all-button");
    const clearButton = document.getElementById("clear-button");
    const resetSelectionButton = document.getElementById("reset-selection-button");
    const customerUrlInput = document.getElementById("customer-url");
    const copyUrlButton = document.getElementById("copy-url-button");
    const quickCopyUrlButton = document.getElementById("quick-copy-url-button");
    const quickUrlSummary = document.getElementById("quick-url-summary");
    const selectedCarSummary = document.getElementById("selected-car-summary");
    const openCustomerUrl = document.getElementById("open-customer-url");

    let cars = [];

    main();

    async function main() {
      try {
        const response = await fetch("./cars.json", { cache: "no-store" });
        if (!response.ok) throw new Error("cars.json を読み込めませんでした");
        cars = await response.json();
        renderCars();
        setupButtons();
      } catch (error) {
        console.error(error);
        statusEl.textContent = "車種データを読み込めませんでした。cars.json を確認してください。";
      }
    }

    function getEnabledCarIds() {
      const raw = localStorage.getItem(ENABLED_CARS_STORAGE_KEY);
      if (!raw) return null;

      try {
        const ids = JSON.parse(raw);
        return Array.isArray(ids) ? ids : null;
      } catch {
        return null;
      }
    }

    function renderCars() {
      const enabledIds = getEnabledCarIds();
      const enabledSet = enabledIds ? new Set(enabledIds) : new Set(cars.map((car) => car.id));

      listEl.innerHTML = "";

      cars.forEach((car) => {
        const label = document.createElement("label");
        label.className = "car-select-item";
        label.innerHTML = `
          <input type="checkbox" value="${escapeHtml(car.id)}" ${enabledSet.has(car.id) ? "checked" : ""} />
          <div>
            <div class="car-select-name">${escapeHtml(car.name)}</div>
            <div class="car-select-meta">targetIndex: ${car.targetIndex} / ${escapeHtml(car.type || "")}</div>
          </div>
        `;
        listEl.appendChild(label);
      });

      updateStatus();
    }

    function setupButtons() {
      selectAllButton.addEventListener("click", () => {
        getCheckboxes().forEach((checkbox) => checkbox.checked = true);
        updateStatus();
      });

      clearButton.addEventListener("click", () => {
        getCheckboxes().forEach((checkbox) => checkbox.checked = false);
        updateStatus();
      });

      listEl.addEventListener("change", updateStatus);

      saveButton.addEventListener("click", () => {
        const ids = getSelectedIds();

        if (ids.length === 0) {
          window.alert("最低1車種は選択してください。");
          return;
        }

        localStorage.setItem(ENABLED_CARS_STORAGE_KEY, JSON.stringify(ids));
        statusEl.textContent = `${ids.length}車種をこの端末に保存しました。URL共有は上の「お客様用URL」を使ってください。`;
        updateCustomerUrl();
      });

      resetSelectionButton.addEventListener("click", () => {
        localStorage.removeItem(ENABLED_CARS_STORAGE_KEY);
        renderCars();
        statusEl.textContent = "全車種表示に戻しました。";
        updateCustomerUrl();
      });

      copyUrlButton.addEventListener("click", copyCustomerUrl);
      quickCopyUrlButton.addEventListener("click", copyCustomerUrl);
    }

    function getCheckboxes() {
      return [...listEl.querySelectorAll('input[type="checkbox"]')];
    }

    function getSelectedIds() {
      return getCheckboxes()
        .filter((checkbox) => checkbox.checked)
        .map((checkbox) => checkbox.value);
    }

    function updateStatus() {
      const count = getSelectedIds().length;
      statusEl.textContent = `${count} / ${cars.length} 車種を表示対象にしています。`;
      updateCustomerUrl();
    }

    async function copyCustomerUrl() {
      updateCustomerUrl();

      if (getSelectedIds().length === 0) {
        window.alert("最低1車種は選択してください。");
        return;
      }

      try {
        await navigator.clipboard.writeText(customerUrlInput.value);
        statusEl.textContent = "お客様用URLをコピーしました。";
      } catch {
        customerUrlInput.focus();
        customerUrlInput.select();
        statusEl.textContent = "URL欄を選択しました。手動でコピーしてください。";
      }
    }

    function updateCustomerUrl() {
      if (!customerUrlInput) return;

      const ids = getSelectedIds();
      const baseUrl = new URL("./", window.location.href);

      if (ids.length > 0) {
        baseUrl.searchParams.set("cars", ids.join(","));
      } else {
        baseUrl.searchParams.delete("cars");
      }

      const url = baseUrl.toString();
      customerUrlInput.value = url;

      if (openCustomerUrl) {
        openCustomerUrl.href = url;
      }

      if (selectedCarSummary || quickUrlSummary) {
        if (ids.length === 0) {
          if (selectedCarSummary) {
            selectedCarSummary.textContent = "車種が選択されていません。最低1車種を選んでください。";
            selectedCarSummary.classList.add("is-warning");
          }
          if (quickUrlSummary) {
            quickUrlSummary.textContent = "未選択です";
            quickUrlSummary.classList.add("is-warning");
          }
        } else {
          const names = cars
            .filter((car) => ids.includes(car.id))
            .map((car) => car.name);
          if (selectedCarSummary) {
            selectedCarSummary.textContent = `選択中：${names.join(" / ")}`;
            selectedCarSummary.classList.remove("is-warning");
          }
          if (quickUrlSummary) {
            quickUrlSummary.textContent = `${ids.length}車種：${names.join(" / ")}`;
            quickUrlSummary.classList.remove("is-warning");
          }
        }
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
